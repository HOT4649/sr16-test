<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>【SR 16】心理評価テスト</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f5f7fa;
            color: #333333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 700px;
            width: 100%;
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            font-size: 24px;
            margin-bottom: 10px;
        }
        .description {
            text-align: center;
            color: #7f8c8d;
            font-size: 14px;
            margin-bottom: 30px;
            line-height: 1.5;
        }
        .question-block {
            background-color: #fafbfc;
            border: 1px solid #e1e8ed;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .question-text {
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 15px;
            line-height: 1.5;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .option-label {
            display: flex;
            align-items: center;
            padding: 10px;
            border: 1px solid #dcdde1;
            border-radius: 6px;
            cursor: pointer;
            background-color: #ffffff;
            transition: all 0.2s ease;
            font-size: 14px;
        }
        .option-label:hover {
            background-color: #f1f2f6;
            border-color: #a4b0be;
        }
        .option-label input {
            margin-right: 12px;
            transform: scale(1.1);
        }
        .option-label.selected {
            background-color: #e8f4fd;
            border-color: #3498db;
            color: #2980b9;
        }
        .submit-btn {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: #3498db;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 30px;
        }
        .submit-btn:hover {
            background-color: #2980b9;
        }
        #result-section {
            display: none;
            margin-top: 30px;
            border-top: 2px solid #e1e8ed;
            padding-top: 30px;
        }
        .result-title {
            text-align: center;
            color: #2c3e50;
            font-size: 22px;
            margin-bottom: 10px;
        }
        .datetime-box {
            text-align: center;
            font-size: 14px;
            color: #555555;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .score-box {
            text-align: center;
            background-color: #e8f4fd;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 30px;
        }
        .score-value {
            font-size: 32px;
            font-weight: bold;
            color: #2980b9;
        }
        .chart-block {
            margin-bottom: 40px;
            padding: 20px;
            background-color: #fcfcfc;
            border: 1px solid #e6e9ed;
            border-radius: 8px;
        }
        .chart-title {
            text-align: center;
            font-size: 16px;
            font-weight: bold;
            color: #34495e;
            margin-bottom: 15px;
        }
        .chart-container {
            position: relative;
            margin: auto;
            height: 380px;
            width: 100%;
        }
        .color-legend {
            margin-top: 15px;
            padding: 12px;
            background-color: #ffffff;
            border: 1px dashed #ccc;
            border-radius: 6px;
            font-size: 13px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            margin-bottom: 6px;
        }
        .legend-item:last-child {
            margin-bottom: 0;
        }
        .color-box {
            width: 30px;
            height: 16px;
            margin-right: 10px;
            border-radius: 3px;
        }
        .email-section {
            background-color: #f1f2f6;
            padding: 20px;
            border-radius: 8px;
            margin-top: 30px;
            border: 1px solid #dcdde1;
        }
        .email-title {
            font-size: 15px;
            font-weight: bold;
            margin-bottom: 10px;
            color: #2c3e50;
        }
        .email-input {
            width: 100%;
            padding: 10px;
            font-size: 14px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            margin-bottom: 12px;
        }
        .email-btn {
            width: 100%;
            padding: 12px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }
        .email-btn:hover {
            background-color: #27ae60;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>【SR 16】心理評価テスト</h1>
    <p class="description">各質問文を読み、あなたの現在の状態に最も当てはまる点数を1つ選んでください。</p>

    <form id="quiz-form">
        <div id="questions-container"></div>
        <button type="button" class="submit-btn" onclick="calculateResult()">結果を表示する</button>
    </form>

    <div id="result-section">
        <h2 class="result-title">診断結果</h2>
        <div class="datetime-box" id="answer-datetime"></div>

        <div class="score-box">
            <div>全体の平均点</div>
            <div class="score-value" id="average-score">0.0</div>
            <div style="font-size: 12px; color: #7f8c8d; margin-top: 5px;">（6点満点）</div>
        </div>

        <div class="chart-block">
            <div class="chart-title">チャート①：標準順（SR1 ～ SR16）</div>
            <div class="chart-container">
                <canvas id="radarChart1"></canvas>
            </div>
        </div>

        <div class="chart-block">
            <div class="chart-title">チャート②：分類別配置（時計回り・色分け）</div>
            <div class="chart-container">
                <canvas id="radarChart2"></canvas>
            </div>
        </div>

        <div class="chart-block">
            <div class="chart-title">チャート③：NISHI改分類配置</div>
            <div class="chart-container">
                <canvas id="radarChart3"></canvas>
            </div>
            <div class="color-legend">
                <div style="font-weight: bold; margin-bottom: 8px;">【色の説明】</div>
                <div class="legend-item">
                    <div class="color-box" style="background-color: #ff6b6b;"></div>
                    <span><strong>幸せ色</strong> (SR15, SR14, SR10, SR6)</span>
                </div>
                <div class="legend-item">
                    <div class="color-box" style="background-color: #4dbd74;"></div>
                    <span><strong>安心色</strong> (SR1, SR7, SR2, SR3)</span>
                </div>
                <div class="legend-item">
                    <div class="color-box" style="background-color: #ffc107;"></div>
                    <span><strong>トライ＆エラー色</strong> (SR4, SR9, SR11, SR12)</span>
                </div>
                <div class="legend-item">
                    <div class="color-box" style="background-color: #20a8d8;"></div>
                    <span><strong>視点の変更色</strong> (SR5, SR13, SR8, SR16)</span>
                </div>
            </div>
        </div>

        <div class="email-section">
            <div class="email-title">PDF結果をメールで受け取る</div>
            <input type="email" id="user-email" class="email-input" placeholder="example@email.com" required>
            <button type="button" class="email-btn" onclick="sendPdfMail()">PDFをメールで送信する</button>
        </div>
    </div>
</div>

<script>
    // 16の質問データ
    const questions = [
        "SR1. 活力が湧き、人生に前向きになるような状態に、いつでも自力で到達することができる",
        "SR2. 大切な願いを実現し、やりたいことを実行するにはどうすればよいかを心得ている",
        "SR3. つらい状況に陥ったときに、再び幸せな生活を取り戻すにはどうすればよいか心得ている",
        "SR4. ある人（たち）との関係が自分にとって良くない場合、それが満足できる関係になるまで様々な工夫や取り組みを行う",
        "SR5. 仕事、趣味、余暇、食事、パートナー関係など、生活の様々な要素をうまく調節しながら幸せに暮らせている",
        "SR6. プレッシャーのかかる状況におかれた場合、いつも最終的には無事に乗り切れるような行動をとる",
        "SR7. 大切な目標を掲げた場合は、いつも自分の力でこれを達成することができる",
        "SR8. やりたいことができるような状況を、自分で作り出せているので、充実感とともに暮らしている",
        "SR9. 自分の行動が失敗を招いた場合、それは諦めではなく、むしろ新しいやり方を見つけ出すきっかけとなる",
        "SR10. 問題が起こった場合、これをすっきりと解決できる様な斬新なアイデアを、いつも見つけ出すことができる",
        "SR11. 不快な結果に陥りがちなやり方は止め、長い目で見て好ましい結果に繋がるように、自分の行動をうまく調整できている",
        "SR12. 思ったような結果が得られなかった場合、新しいやり方や考え方を見つけ、それを試すことができる",
        "SR13. 自分にとって重要な人（たち）との関係では、快適な関係になるように自分からうまくその人（たち）と距離を調節することができる",
        "SR14. 日々の活動を通じて、常に満ち足りた気持ちで暮らすことができる",
        "SR15. 日々の活動を通じて、心身ともにいつも幸せに暮らしている",
        "SR16. 暮らしの中で何度も楽しい体験ができる様な状況を、自分でつくり出すことができる"
    ];

    const options = [
        { text: "6. とても 当てはまる", value: 6 },
        { text: "5. かなり 当てはまる", value: 5 },
        { text: "4. どちらかというと 当てはまる", value: 4 },
        { text: "3. どちらかというと 当てはまらない", value: 3 },
        { text: "2. ほとんど 当てはまらない", value: 2 },
        { text: "1. まったく 当てはまらない", value: 1 }
    ];

    // チャート2用の設定
    const chart2Order = [1, 14, 15, 2, 7, 8, 16, 3, 6, 9, 12, 4, 13, 5, 10, 11];
    
    function getColorForSR(srNumber) {
        if ([1, 14, 15].includes(srNumber)) return '#2ecc71'; 
        if ([2, 7, 8, 16].includes(srNumber)) return '#e67e22'; 
        if ([3, 6, 9, 12].includes(srNumber)) return '#e74c3c'; 
        if ([4, 13].includes(srNumber)) return '#9b59b6'; 
        if ([5, 10, 11].includes(srNumber)) return '#3498db'; 
        return '#7f8c8d';
    }

    // チャート3（NISHI改分類配置）用の設定
    const chart3Order = [10, 6, 1, 7, 2, 3, 4, 9, 11, 12, 5, 13, 8, 16, 15, 14];
    
    // チャート3の色分けルール
    function getColorForChart3(srNumber) {
        if ([15, 14, 10, 6].includes(srNumber)) return '#ff6b6b';   // 幸せ色（パステル赤）
        if ([1, 7, 2, 3].includes(srNumber)) return '#4dbd74';      // 安心色（パステル緑）
        if ([4, 9, 11, 12].includes(srNumber)) return '#ffc107';    // トライ＆エラー色（黄色）
        if ([5, 13, 8, 16].includes(srNumber)) return '#20a8d8';    // 視点の変更色（ライトブルー）
        return '#7f8c8d';
    }

    // 画面に質問を自動生成
    const container = document.getElementById('questions-container');
    questions.forEach((q, qIndex) => {
        const qBlock = document.createElement('div');
        qBlock.className = 'question-block';
        const qText = document.createElement('div');
        qText.className = 'question-text';
        qText.innerText = q;
        qBlock.appendChild(qText);

        const optionsDiv = document.createElement('div');
        optionsDiv.className = 'options';

        options.forEach((opt) => {
            const label = document.createElement('label');
            label.className = 'option-label';
            const input = document.createElement('input');
            input.type = 'radio';
            input.name = `q${qIndex}`;
            input.value = opt.value;
            input.required = true;

            input.addEventListener('change', function() {
                const siblings = optionsDiv.querySelectorAll('.option-label');
                siblings.forEach(s => s.classList.remove('selected'));
                if (this.checked) label.classList.add('selected');
            });

            label.appendChild(input);
            label.appendChild(document.createTextNode(opt.text));
            optionsDiv.appendChild(label);
        });
        qBlock.appendChild(optionsDiv);
        container.appendChild(qBlock);
    });

    let chart1 = null;
    let chart2 = null;
    let chart3 = null;

    // 回答日時の自動生成と表示用の関数
    function showDateTime() {
        const now = new Date();
        const year = now.getFullYear();
        const month = now.getMonth() + 1;
        const date = now.getDate();
        const dayList = ['日', '月', '火', '水', '木', '金', '土'];
        const day = dayList[now.getDay()];
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        
        const formatString = `回答日時：${year}年${month}月${date}日(${day}) ${hours}時${minutes}分`;
        document.getElementById('answer-datetime').innerText = formatString;
    }

    function calculateResult() {
        const baseScores = [];
        let total = 0;

        for (let i = 0; i < questions.length; i++) {
            const radios = document.getElementsByName(`q${i}`);
            let selectedValue = null;
            for (const radio of radios) {
                if (radio.checked) {
                    selectedValue = parseInt(radio.value);
                    break;
                }
            }
            if (selectedValue === null) {
                alert(`質問 SR${i + 1} にまだ回答していません。`);
                return;
            }
            baseScores.push(selectedValue);
            total += selectedValue;
        }

        // 平均表示 & 日時表示
        const avg = (total / questions.length).toFixed(2);
        document.getElementById('average-score').innerText = avg;
        showDateTime(); 
        document.getElementById('result-section').style.display = 'block';

        // 古いグラフを破棄
        if (chart1) chart1.destroy();
        if (chart2) chart2.destroy();
        if (chart3) chart3.destroy();

        // 共通のグリッド・枠線スタイル調整（見やすく太くする設定）
        const gridScaleOptions = {
            suggestedMin: 1,
            suggestedMax: 6,
            ticks: { 
                stepSize: 1,
                font: { size: 11, weight: 'bold' }
            },
            grid: {
                lineWidth: 2,          // チャートの同心円の線を太く
                color: 'rgba(0, 0, 0, 0.15)'
            },
            angleLines: {
                lineWidth: 2,          // 放射状の線を太く
                color: 'rgba(0, 0, 0, 0.15)'
            }
        };

        // --- チャート1：標準描画 ---
        const ctx1 = document.getElementById('radarChart1').getContext('2d');
        chart1 = new Chart(ctx1, {
            type: 'radar',
            data: {
                labels: questions.map((_, i) => `SR${i + 1}`),
                datasets: [{
                    label: 'スコア（標準順）',
                    data: baseScores,
                    backgroundColor: 'rgba(52, 152, 219, 0.1)',
                    borderColor: 'rgba(52, 152, 219, 1)',
                    borderWidth: 4, // 線の太さをアップ
                    pointBackgroundColor: 'rgba(52, 152, 219, 1)',
                    pointRadius: 5
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: { r: gridScaleOptions }
            }
        });

        // --- チャート2：指定順＆個別色分け描画（線で繋がない） ---
        const ctx2 = document.getElementById('radarChart2').getContext('2d');
        const chart2Labels = chart2Order.map(num => `SR${num}`);
        const chart2Scores = chart2Order.map(num => baseScores[num - 1]);
        const chart2Colors = chart2Order.map(num => getColorForSR(num));

        // チャート2独自のスケール設定（太めの設定を引き継ぎつつ、線の色を個別化）
        const chart2ScaleOptions = JSON.parse(JSON.stringify(gridScaleOptions));
        chart2ScaleOptions.pointLabels = {
            color: chart2Colors,
            font: { size: 13, weight: 'bold' }
        };
        chart2ScaleOptions.angleLines = {
            color: chart2Colors,
            lineWidth: 2.5 // 個別軸の線をより見やすく
        };

        chart2 = new Chart(ctx2, {
            type: 'radar',
            data: {
                labels: chart2Labels,
                datasets: [{
                    label: 'スコア（分類別）',
                    data: chart2Scores,
                    showLine: false, // ★点と点を線で繋がない
                    pointBackgroundColor: chart2Colors,
                    pointBorderColor: '#fff',
                    pointRadius: 6 // 点を少し大きく
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: { r: chart2ScaleOptions }
            }
        });


        // --- チャート3：NISHI改分類配置（線で繋がない、指定色グループ化） ---
        const ctx3 = document.getElementById('radarChart3').getContext('2d');
        const chart3Labels = chart3Order.map(num => `SR${num}`);
        const chart3Scores = chart3Order.map(num => baseScores[num - 1]);
        const chart3Colors = chart3Order.map(num => getColorForChart3(num));

        // チャート3のカスタムスケール（文字と軸線をご指定のカラーに）
        const chart3ScaleOptions = JSON.parse(JSON.stringify(gridScaleOptions));
        chart3ScaleOptions.pointLabels = {
            color: chart3Colors,
            font: { size: 13, weight: 'bold' }
        };
        chart3ScaleOptions.angleLines = {
            color: chart3Colors,
            lineWidth: 2.5
        };

        chart3 = new Chart(ctx3, {
            type: 'radar',
            data: {
                labels: chart3Labels,
                datasets: [{
                    label: 'スコア（NISHI改分類配置）',
                    data: chart3Scores,
                    showLine: false, // ★点と点を線で繋がない
                    pointBackgroundColor: chart3Colors,
                    pointBorderColor: '#fff',
                    pointRadius: 6
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: { r: chart3ScaleOptions }
            }
        });

        document.getElementById('result-section').scrollIntoView({ behavior: 'smooth' });
    }

    // メール送信処理（シミュレーション・雛形）
    function sendPdfMail() {
        const email = document.getElementById('user-email').value;
        if (!email) {
            alert('メールアドレスを入力してください。');
            return;
        }
        
        // 実際の実装では、ここでサーバーサイド(PHP、Node.js、GAS等)に
        // データを送信してPDFを生成・送信する処理を行います。
        alert(`${email} 宛てに診断結果PDFを送信するリクエストを受け付けました。\n（※実際のメール送信にはサーバー側バックエンドプログラムとの連携が必要です）`);
    }
</script>

</body>
</html>
