<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>【SR 16】心理評価テスト</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f5f7fa;
            color: #333333;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            max-width: 700px;
            width: 100%;
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            font-size: 24px;
            margin-bottom: 10px;
        }
        .description {
            text-align: center;
            color: #7f8c8d;
            font-size: 14px;
            margin-bottom: 30px;
            line-height: 1.5;
        }
        .question-block {
            background-color: #fafbfc;
            border: 1px solid #e1e8ed;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .question-text {
            font-weight: 600;
            font-size: 15px;
            margin-bottom: 15px;
            line-height: 1.5;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .option-label {
            display: flex;
            align-items: center;
            padding: 10px;
            border: 1px solid #dcdde1;
            border-radius: 6px;
            cursor: pointer;
            background-color: #ffffff;
            transition: all 0.2s ease;
            font-size: 14px;
        }
        .option-label:hover {
            background-color: #f1f2f6;
            border-color: #a4b0be;
        }
        .option-label input {
            margin-right: 12px;
            transform: scale(1.1);
        }
        .option-label.selected {
            background-color: #e8f4fd;
            border-color: #3498db;
            color: #2980b9;
        }
        .submit-btn {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: #3498db;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 30px;
        }
        .submit-btn:hover {
            background-color: #2980b9;
        }
        #result-section {
            display: none;
            margin-top: 30px;
            border-top: 2px solid #e1e8ed;
            padding-top: 30px;
        }
        /* PDF出力時に見栄えを保つためのエリア設定 */
        #pdf-content {
            background-color: #ffffff;
            padding: 10px;
        }
        .result-title {
            text-align: center;
            color: #2c3e50;
            font-size: 22px;
            margin-bottom: 10px;
        }
        .datetime-box {
            text-align: center;
            font-size: 14px;
            color: #555555;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .score-box {
            text-align: center;
            background-color: #e8f4fd;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 30px;
        }
        .score-value {
            font-size: 32px;
            font-weight: bold;
            color: #2980b9;
        }
        .chart-block {
            margin-bottom: 40px;
            padding: 20px;
            background-color: #fcfcfc;
            border: 1px solid #e6e9ed;
            border-radius: 8px;
            page-break-inside: avoid; /* PDF化の際の途切れ防止 */
        }
        .chart-title {
            text-align: center;
            font-size: 16px;
            font-weight: bold;
            color: #34495e;
            margin-bottom: 15px;
        }
        .chart-container {
            position: relative;
            margin: auto;
            height: 380px;
            width: 100%;
        }
        .color-legend {
            margin-top: 15px;
            padding: 12px;
            background-color: #ffffff;
            border: 1px dashed #ccc;
            border-radius: 6px;
            font-size: 13px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            margin-bottom: 6px;
        }
        .legend-item:last-child {
            margin-bottom: 0;
        }
        .color-box {
            width: 30px;
            height: 16px;
            margin-right: 10px;
            border-radius: 3px;
        }
        .download-section {
            background-color: #eafaf1;
            padding: 20px;
            border-radius: 8px;
            margin-top: 30px;
            border: 1px solid #2ecc71;
            text-align: center;
        }
        .download-btn {
            width: 100%;
            padding: 15px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .download-btn:hover {
            background-color: #27ae60;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>【SR 16】心理評価テスト</h1>
    <p class="description">各質問文を読み、あなたの現在の状態に最も当てはまる点数を1つ選んでください。</p>

    <form id="quiz-form">
        <div id="questions-container"></div>
        <button type="button" class="submit-btn" onclick="calculateResult()">結果を表示する</button>
    </form>

    <div id="result-section">
        <div id="pdf-content">
            <h2 class="result-title">診断結果</h2>
            <div class="datetime-box" id="answer-datetime"></div>

            <div class="score-box">
                <div>全体の平均点</div>
                <div class="score-value" id="average-score">0.0</div>
                <div style="font-size: 12px; color: #7f8c8d; margin-top: 5px;">（6点満点）</div>
            </div>

            <div class="chart-block">
                <div class="chart-title">チャート①：標準順（SR1 ～ SR16）</div>
                <div class="chart-container">
                    <canvas id="radarChart1"></canvas>
                </div>
            </div>

            <div class="chart-block">
                <div class="chart-title">チャート②：分類別配置（時計回り・同色線繋ぎ）</div>
                <div class="chart-container">
                    <canvas id="radarChart2"></canvas>
                </div>
            </div>

            <div class="chart-block">
                <div class="chart-title">チャート③：NISHI改分類配置</div>
                <div class="chart-container">
                    <canvas id="radarChart3"></canvas>
                </div>
                <div class="color-legend">
                    <div style="font-weight: bold; margin-bottom: 8px;">【チャート③：色の説明】</div>
                    <div class="legend-item">
                        <div class="color-box" style="background-color: #d11a5b;"></div>
                        <span><strong>幸せ色</strong> (SR15, SR14, SR10, SR6)</span>
                    </div>
                    <div class="legend-item">
                        <div class="color-box" style="background-color: #00b894;"></div>
                        <span><strong>安心色</strong> (SR1, SR7, SR2, SR3)</span>
                    </div>
                    <div class="legend-item">
                        <div class="color-box" style="background-color: #f39c12;"></div>
                        <span><strong>トライ＆エラー色</strong> (SR4, SR9, SR11, SR12)</span>
                    </div>
                    <div class="legend-item">
                        <div class="color-box" style="background-color: #2980b9;"></div>
                        <span><strong>視点の変更色</strong> (SR5, SR13, SR8, SR16)</span>
                    </div>
                </div>
            </div>
        </div>
        <div class="download-section">
            <p style="margin-top:0; font-size:14px; color:#27ae60; font-weight:bold;">診断結果をPDFとして保存できます</p>
            <button type="button" class="download-btn" onclick="downloadResultPDF()">診断結果PDFをダウンロード</button>
        </div>
    </div>
</div>

<script>
    // 16の質問データ
    const questions = [
        "SR1. 活力が湧き、人生に前向きになるような状態に、いつでも自力で到達することができる",
        "SR2. 大切な願いを実現し、やりたいことを実行するにはどうすればよいかを心得ている",
        "SR3. つらい状況に陥ったときに、再び幸せな生活を取り戻すにはどうすればよいか心得ている",
        "SR4. ある人（たち）との関係が自分にとって良くない場合、それが満足できる関係になるまで様々な工夫や取り組みを行う",
        "SR5. 仕事、趣味、余暇、食事、パートナー関係など、生活の様々な要素をうまく調節しながら幸せに暮らせている",
        "SR6. プレッシャーのかかる状況におかれた場合、いつも最終的には無事に乗り切れるような行動をとる",
        "SR7. 大切な目標を掲げた場合は、いつも自分の力でこれを達成することができる",
        "SR8. やりたいことができるような状況を、自分で作り出せているので、充実感とともに暮らしている",
        "SR9. 自分の行動が失敗を招いた場合、それは諦めではなく、むしろ新しいやり方を見つけ出すきっかけとなる",
        "SR10. 問題が起こった場合、これをすっきりと解決できる様な斬新なアイデアを、いつも見つけ出すことができる",
        "SR11. 不快な結果に陥りがちなやり方は止め、長い目で見て好ましい結果に繋がるように、自分の行動をうまく調整できている",
        "SR12. 思ったような結果が得られなかった場合、新しいやり方や考え方を見つけ、それを試すことができる",
        "SR13. 自分にとって重要な人（たち）との関係では、快適な関係になるように自分からうまくその人（たち）と距離を調節することができる",
        "SR14. 日々の活動を通じて、常に満ち足りた気持ちで暮らすことができる",
        "SR15. 日々の活動を通じて、心身ともにいつも幸せに暮らしている",
        "SR16. 暮らしの中で何度も楽しい体験ができる様な状況を、自分でつくり出すことができる"
    ];

    const options = [
        { text: "6. とても 当てはまる", value: 6 },
        { text: "5. かなり 当てはまる", value: 5 },
        { text: "4. どちらかというと 当てはまる", value: 4 },
        { text: "3. どちらかというと 当てはまらない", value: 3 },
        { text: "2. ほとんど 当てはまらない", value: 2 },
        { text: "1. まったく 当てはまらない", value: 1 }
    ];

    // --- チャート②用の設定 ---
    const chart2Order = [1, 14, 15, 2, 7, 8, 16, 3, 6, 9, 12, 4, 13, 5, 10, 11];
    
    // チャート②の色分け（チャート③と完全別色：淡めで見やすい色相に設定）
    function getColorForChart2(srNumber) {
        if ([1, 14, 15].includes(srNumber)) return '#00d2d3';    // シアン（青緑）
        if ([2, 7, 8, 16].includes(srNumber)) return '#ff9f43';   // ライトオレンジ
        if ([3, 6, 9, 12].includes(srNumber)) return '#10ac84';   // ダークミントグリーン
        if ([4, 13].includes(srNumber)) return '#54a0ff';         // スカイブルー
        if ([5, 10, 11].includes(srNumber)) return '#9b59b6';     // パープル
        return '#7f8c8d';
    }

    // --- チャート③用の設定（NISHI改分類配置） ---
    const chart3Order = [10, 6, 1, 7, 2, 3, 4, 9, 11, 12, 5, 13, 8, 16, 15, 14];
    
    // チャート③の色分け（幸せ色、安心色、トライ＆エラー色、視点の変更色）
    function getColorForChart3(srNumber) {
        if ([15, 14, 10, 6].includes(srNumber)) return '#d11a5b';   // 幸せ色（ビビッドな赤紫）
        if ([1, 7, 2, 3].includes(srNumber)) return '#00b894';      // 安心色（深みのあるエメラルド）
        if ([4, 9, 11, 12].includes(srNumber)) return '#f39c12';    // トライ＆エラー色（ディープイエロー）
        if ([5, 13, 8, 16].includes(srNumber)) return '#2980b9';    // 視点の変更色（鮮やかなブルー）
        return '#7f8c8d';
    }

    // 質問フォームの動的生成
    const container = document.getElementById('questions-container');
    questions.forEach((q, qIndex) => {
        const qBlock = document.createElement('div');
        qBlock.className = 'question-block';
        const qText = document.createElement('div');
        qText.className = 'question-text';
        qText.innerText = q;
        qBlock.appendChild(qText);

        const optionsDiv = document.createElement('div');
        optionsDiv.className = 'options';

        options.forEach((opt) => {
            const label = document.createElement('label');
            label.className = 'option-label';
            const input = document.createElement('input');
            input.type = 'radio';
            input.name = `q${qIndex}`;
            input.value = opt.value;
            input.required = true;

            input.addEventListener('change', function() {
                const siblings = optionsDiv.querySelectorAll('.option-label');
                siblings.forEach(s => s.classList.remove('selected'));
                if (this.checked) label.classList.add('selected');
            });

            label.appendChild(input);
            label.appendChild(document.createTextNode(opt.text));
            optionsDiv.appendChild(label);
        });
        qBlock.appendChild(optionsDiv);
        container.appendChild(qBlock);
    });

    let chart1 = null;
    let chart2 = null;
    let chart3 = null;

    // 回答日時の自動取得・表示
    function showDateTime() {
        const now = new Date();
        const year = now.getFullYear();
        const month = now.getMonth() + 1;
        const date = now.getDate();
        const dayList = ['日', '月', '火', '水', '木', '金', '土'];
        const day = dayList[now.getDay()];
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        
        return `${year}年${month}月${date}日(${day}) ${hours}時${minutes}分`;
    }

    function calculateResult() {
        const baseScores = [];
        let total = 0;

        for (let i = 0; i < questions.length; i++) {
            const radios = document.getElementsByName(`q${i}`);
            let selectedValue = null;
            for (const radio of radios) {
                if (radio.checked) {
                    selectedValue = parseInt(radio.value);
                    break;
                }
            }
            if (selectedValue === null) {
                alert(`質問 SR${i + 1} にまだ回答していません。`);
                return;
            }
            baseScores.push(selectedValue);
            total += selectedValue;
        }

        // 平均表示 & 日時セット
        const avg = (total / questions.length).toFixed(2);
        document.getElementById('average-score').innerText = avg;
        document.getElementById('answer-datetime').innerText = `回答日時：${showDateTime()}`;
        document.getElementById('result-section').style.display = 'block';

        // 既存グラフのクリア
        if (chart1) chart1.destroy();
        if (chart2) chart2.destroy();
        if (chart3) chart3.destroy();

        // 共通：太く見やすいグリッド設定
        const gridScaleOptions = {
            suggestedMin: 1,
            suggestedMax: 6,
            ticks: { 
                stepSize: 1,
                font: { size: 11, weight: 'bold' }
            },
            grid: {
                lineWidth: 2,
                color: 'rgba(0, 0, 0, 0.15)'
            },
            angleLines: {
                lineWidth: 2,
                color: 'rgba(0, 0, 0, 0.15)'
            }
        };

        // --- チャート①：標準順 ---
        const ctx1 = document.getElementById('radarChart1').getContext('2d');
        chart1 = new Chart(ctx1, {
            type: 'radar',
            data: {
                labels: questions.map((_, i) => `SR${i + 1}`),
                datasets: [{
                    label: 'スコア（標準順）',
                    data: baseScores,
                    backgroundColor: 'rgba(52, 152, 219, 0.08)',
                    borderColor: 'rgba(52, 152, 219, 1)',
                    borderWidth: 4,
                    pointBackgroundColor: 'rgba(52, 152, 219, 1)',
                    pointRadius: 5
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: { r: gridScaleOptions }
            }
        });

        // --- チャート②：分類別配置（同じ色のみ線で繋ぐ） ---
        const ctx2 = document.getElementById('radarChart2').getContext('2d');
        const chart2Labels = chart2Order.map(num => `SR${num}`);
        const chart2Colors = chart2Order.map(num => getColorForChart2(num));

        // グループごとに「同じ色なら値を保持、違う色ならnull」のデータ配列を作り、データセットを分ける
        const groups = [
            { label: 'グループA', items: [1, 14, 15], color: '#00d2d3' },
            { label: 'グループB', items: [2, 7, 8, 16], color: '#ff9f43' },
            { label: 'グループC', items: [3, 6, 9, 12], color: '#10ac84' },
            { label: 'グループD', items: [4, 13], color: '#54a0ff' },
            { label: 'グループE', items: [5, 10, 11], color: '#9b59b6' }
        ];

        const chart2Datasets = groups.map(g => {
            const dataForGroup = chart2Order.map(num => {
                return g.items.includes(num) ? baseScores[num - 1] : null;
            });
            return {
                label: g.label,
                data: dataForGroup,
                borderColor: g.color,
                backgroundColor: 'transparent',
                borderWidth: 4,          // 線を太く
                pointBackgroundColor: g.color,
                pointBorderColor: '#fff',
                pointRadius: 6,
                spanGaps: false         // null を跨いで線を繋がない設定
            };
        });

        const chart2ScaleOptions = JSON.parse(JSON.stringify(gridScaleOptions));
        chart2ScaleOptions.pointLabels = {
            color: chart2Colors,
            font: { size: 13, weight: 'bold' }
        };
        chart2ScaleOptions.angleLines = {
            color: 'rgba(0,0,0,0.1)',
            lineWidth: 2
        };

        chart2 = new Chart(ctx2, {
            type: 'radar',
            data: {
                labels: chart2Labels,
                datasets: chart2Datasets
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } }, // 分割用ラベルは非表示
                scales: { r: chart2ScaleOptions }
            }
        });

        // --- チャート③：NISHI改分類配置（点は線で繋がない） ---
        const ctx3 = document.getElementById('radarChart3').getContext('2d');
        const chart3Labels = chart3Order.map(num => `SR${num}`);
        const chart3Scores = chart3Order.map(num => baseScores[num - 1]);
        const chart3Colors = chart3Order.map(num => getColorForChart3(num));

        const chart3ScaleOptions = JSON.parse(JSON.stringify(gridScaleOptions));
        chart3ScaleOptions.pointLabels = {
            color: chart3Colors,
            font: { size: 13, weight: 'bold' }
        };
        chart3ScaleOptions.angleLines = {
            color: chart3Colors,
            lineWidth: 2.5
        };

        chart3 = new Chart(ctx3, {
            type: 'radar',
            data: {
                labels: chart3Labels,
                datasets: [{
                    label: 'スコア（NISHI改分類配置）',
                    data: chart3Scores,
                    showLine: false, // ★点は線で繋がない
                    pointBackgroundColor: chart3Colors,
                    pointBorderColor: '#fff',
                    pointRadius: 6
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: { r: chart3ScaleOptions }
            }
        });

        document.getElementById('result-section').scrollIntoView({ behavior: 'smooth' });
    }

    // PDFダウンロード生成用の処理関数
    function downloadResultPDF() {
        const element = document.getElementById('pdf-content');
        
        // PDFの出力設定
        const opt = {
            margin:       10,
            filename:     '心理評価テスト_診断結果.pdf',
            image:        { type: 'jpeg', quality: 0.98 },
            html2canvas:  { scale: 2, useCORS: true }, // 高解像度化
            jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        // PDF生成および保存の実行
        html2pdf().set(opt).from(element).save();
    }
</script>

</body>
</html>
